services:
  web:
    container_name: web
    build: .
    command: python manage.py runserver 0.0.0.0:8007
    volumes:
      - ./:/usr/src/ludo/
      - ../data:/usr/src/data
    ports:
      - 8007:8007
    env_file:
      - .env.compose
      - .env    # Define secrets here, see .env.template
    environment:
      # Falls back to the container-internal mount path if LOCAL_STORAGE_ROOT is not set in .env.
      # ../data on the host is mounted to /usr/src/data (see volumes above).
      - LOCAL_STORAGE_ROOT=${LOCAL_STORAGE_ROOT:-/usr/src/data}
    depends_on:
      - db
  db:
    container_name: db
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
      - POSTGRES_USER=ludo
      - POSTGRES_PASSWORD=ludo
      - POSTGRES_DB=ludo_dev
    ports:
      - 5432:5432
  fake-siu:
    container_name: fake-siu
    build: fake-siu
    stop_grace_period: 1s
    ports:
      - 3000:3000
    volumes:
      - ./fake-siu/db.json:/app/db.json

volumes:
  postgres_data:
